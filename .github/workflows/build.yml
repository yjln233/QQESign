name: Build QQESign dylib

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          set -e
          sudo mkdir -p /opt/theos
          sudo chown "$USER" /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> "$GITHUB_ENV"

      - name: Download iOS SDK
        run: |
          set -e
          mkdir -p /opt/theos/sdks
          cd /opt/theos/sdks
          curl -fL --retry 3 --retry-all-errors -O https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz
          tar -xJf iPhoneOS16.5.sdk.tar.xz
          rm -f iPhoneOS16.5.sdk.tar.xz

      - name: Install ldid
        run: brew install ldid || true

      - name: Build dylib
        run: |
          set -e
          export THEOS=/opt/theos
          export ARCHS=arm64e
          SDK=$(ls /opt/theos/sdks/ | grep iPhoneOS | sort -V | tail -1 | sed 's/\.sdk//')
          export TARGET="iphone:clang:${SDK}:15.0"
          echo "Building with SDK: $SDK TARGET: $TARGET"
          make clean
          make STRIP=1
          find .theos/obj -name "QQESign.dylib"

      - name: Collect artifacts
        run: |
          set -e
          mkdir -p dist
          find .theos/obj -name "QQESign.dylib" -exec cp {} dist/ \;
          test -f dist/QQESign.dylib
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QQESign-arm64e
          path: dist/QQESign.dylib
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: QQESign v1.0.${{ github.run_number }}
          body: |
            QQESign arm64e dylib

            Commit: ${{ github.sha }}
          files: dist/QQESign.dylib
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
