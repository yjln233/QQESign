name: Build QQESign dylib

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          set -e
          sudo mkdir -p /opt/theos
          sudo chown "$USER" /opt/theos
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> "$GITHUB_ENV"

      - name: Download iOS SDK
        run: |
          set -e
          mkdir -p /opt/theos/sdks
          cd /opt/theos/sdks
          curl -fL --retry 3 --retry-all-errors -O https://github.com/theos/sdks/releases/latest/download/iPhoneOS16.5.sdk.tar.xz
          tar -xJf iPhoneOS16.5.sdk.tar.xz
          rm -f iPhoneOS16.5.sdk.tar.xz

      - name: Install ldid
        run: brew install ldid || true

      - name: Build dylib (Logos + clang, no Theos tweak.mk)
        run: |
          set -e
          export THEOS=/opt/theos
          SDKROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDKROOT"

          # Step 1: Logos preprocess (.x -> .m)
          # %config(generator=internal) is in source file — ensures internal generator
          LOGOS=$(find "$THEOS" -name "logos.pl" -path "*/bin/*" | head -1)
          echo "Using Logos: $LOGOS"
          perl "$LOGOS" Tweak.x > Tweak.x.m
          echo "=== Logos preprocessing done ==="

          # Verify: internal generator should NOT produce MSHookMessageEx calls
          if grep -q 'MSHookMessageEx\|MSHookFunction\|HBLogDebug' Tweak.x.m; then
            echo "ERROR: Logos output contains Substrate calls! Generator=internal not working"
            echo "--- checking for substrate references ---"
            grep -n 'MSHook\|substrate\|Substrate' Tweak.x.m || true
            exit 1
          fi
          echo "OK: no Substrate references in preprocessed code"

          # Verify: should contain objc runtime calls (proof internal generator worked)
          if grep -q 'method_setImplementation\|class_getInstanceMethod' Tweak.x.m; then
            echo "OK: internal generator produced ObjC runtime hooks"
          else
            echo "WARNING: no ObjC runtime hook calls found, hooks may not work"
          fi

          # Step 2: Compile + link dylib directly (zero substrate dependency)
          xcrun -sdk iphoneos clang -arch arm64 \
            -miphoneos-version-min=10.0 \
            -isysroot "$SDKROOT" \
            -fobjc-arc -DQQESIGN_SIDELOAD=1 \
            -dynamiclib \
            -install_name @rpath/QQESign.dylib \
            -framework UIKit -framework Foundation \
            -framework CoreGraphics -framework Photos \
            -o QQESign.dylib Tweak.x.m

          echo "Build succeeded"

      - name: Verify dylib
        run: |
          set -e
          echo "=== file ==="
          file QQESign.dylib
          echo "=== lipo ==="
          lipo -info QQESign.dylib
          echo "=== otool -L (dependencies) ==="
          otool -L QQESign.dylib
          echo "=== check no substrate ==="
          if otool -L QQESign.dylib | grep -i substrate; then
            echo "ERROR: dylib links against CydiaSubstrate!"
            exit 1
          fi
          echo "OK: no substrate dependency"

      - name: Collect artifacts
        run: |
          set -e
          mkdir -p dist
          cp QQESign.dylib dist/
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QQESign-arm64
          path: dist/QQESign.dylib
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: QQESign v1.0.${{ github.run_number }}
          body: |
            QQESign arm64 dylib

            Commit: ${{ github.sha }}
          files: dist/QQESign.dylib
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
